{% load static %}
<header>

  <nav>
    <a href="{% url 'workers:index' %}"><img class="logo" src="{% static 'images/logo.png' %}" alt="logo.png"></a>
    <div class="navbar-identity">
      <p>Administrativo</p>
      {% if workerID %}
      <div class="navbar-identity-worker">
        <p class="navbar-identity-worker-name">{{ worker_first_name }}</p>
        <p> - </p>
        <p class="navbar-identity-worker-role">{{ worker_role }}</p>
      </div>
      {% endif %}
    </div>
    {% if workerID %}
    <a class="navbar-link" href="{% url 'workers:index' %}">Página Inicial</a>
    <ul class="navbar-dropdown">
      <li class="navbar-dropdown-item">
        <a class="navbar-link navbar-dropdown-toggle" href="#">
          Gerenciar
          <img class="navbar-dropdown-icon" src="{% static 'icons/down-arrow.ico' %}" alt="down-arrow.ico">
        </a>
        <ul class="navbar-dropdown-menu">
          <li class="navbar-dropdown-option"><a class="navbar-dropdown-link" href="#">Refeições</a></li>
          <li class="navbar-dropdown-option"><a class="navbar-dropdown-link" href="#">Categorias</a></li>
          <li class="navbar-dropdown-option"><a class="navbar-dropdown-link" href="{% url 'core:stock' %}">Estoque</a>
          </li>
          <li class="navbar-dropdown-option"><a class="navbar-dropdown-link" href="#">Produtos</a></li>
        </ul>
      </li>
    </ul>
    <a class="navbar-link" href="#">Promoções</a>
    <a class="navbar-link" href="#">Notificação</a>
    <a href="{% url 'workers:logout' %}" class="button-main-primary">Sair</a>
    {% endif %}
  </nav>

</header>
