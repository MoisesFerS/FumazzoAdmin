{% load static %}

<form method="post">

    {% csrf_token %}

    <div class="form">
        <div>
            <p><b>NOME</b></p>
            {{form.name}}
        </div>

        <div>
            <p><b>INÍCIO DO TURNO</b></p>
            {{form.start_time}}
        </div>

        <div>
            <p><b>FIM DO TURNO</b></p>
            {{form.end_time}}
        </div>

        <div>
            <button type="submit" class="button-1">REGISTRAR</button>
        </div>
    </div>

</form>
