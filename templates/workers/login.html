{% extends 'base.html' %}
{% load static %}

{% block title %}{% endblock %}

{% block css %}
  <link rel="stylesheet" href="{% static 'css/workers/login.css' %}">
{% endblock %}

{% block content %}

<div class="main-content">
  <div class="login-section">

    <div class="login-brand">
      <img src="{% static 'images/logo.png' %}" class="login-logo" alt="">
      <h2 class="login-welcome">BEM VINDO</h2>
      <p class="login-caption caption">Fumazzo Administrativo</p>
    </div>

    <div class="login-form">
      <h2 class="login-title title">LOG-IN</h2>
      {% include form_path %}
    </div>
    
  </div>
</div>

{% endblock %}
